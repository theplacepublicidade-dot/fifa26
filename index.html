<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FUTFRALDA · Copinha FIFA 26</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7faf5;
      --panel: #ffffff;
      --panel-soft: #f1f7f1;
      --ink: #17332a;
      --muted: #66756e;
      --line: #dfe8df;
      --grass: #48a868;
      --grass-dark: #1f7b49;
      --grass-soft: #dff2e5;
      --pink: #f7b8ce;
      --pink-soft: #fdeaf1;
      --blue: #a8daf4;
      --blue-soft: #e8f6fd;
      --yellow: #f6c75c;
      --danger: #e66967;
      --shadow: 0 18px 44px rgba(24, 58, 43, .11);
      --shadow-soft: 0 10px 28px rgba(24, 58, 43, .08);
      --radius: 18px;
      --radius-sm: 12px;
      --font-display: "Baloo 2", "Fredoka", "Nunito", system-ui, sans-serif;
      --font-body: "Inter", "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(168, 218, 244, .45), transparent 28rem),
        radial-gradient(circle at 88% 0, rgba(247, 184, 206, .42), transparent 24rem),
        linear-gradient(180deg, #fbfdf9 0%, var(--bg) 46%, #eff7f0 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app-shell {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      min-height: 180px;
      padding: clamp(22px, 4vw, 40px);
      border: 1px solid rgba(72, 168, 104, .24);
      border-radius: 28px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .9), rgba(255, 255, 255, .68)),
        linear-gradient(135deg, rgba(72, 168, 104, .18), rgba(168, 218, 244, .28) 58%, rgba(247, 184, 206, .25));
      box-shadow: var(--shadow);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-color: rgba(31, 123, 73, .17);
      border-style: solid;
    }

    .hero::before {
      inset: 22px;
      border-width: 2px;
      border-radius: 24px;
    }

    .hero::after {
      width: 132px;
      height: 132px;
      right: 13%;
      top: 50%;
      transform: translateY(-50%);
      border-width: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 49%, rgba(31, 123, 73, .16) 50%, transparent 51%);
    }

    .hero-content,
    .top-actions {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2.35rem, 6.5vw, 5.8rem);
      line-height: .92;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.22rem);
      font-weight: 700;
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      color: var(--ink);
      font-size: .88rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.good {
      border-color: rgba(72, 168, 104, .35);
      background: var(--grass-soft);
      color: var(--grass-dark);
    }

    .pill.warn {
      border-color: rgba(246, 199, 92, .55);
      background: #fff6d8;
      color: #7b5609;
    }

    .pill.pink {
      border-color: rgba(247, 184, 206, .7);
      background: var(--pink-soft);
    }

    .pill.blue {
      border-color: rgba(168, 218, 244, .9);
      background: var(--blue-soft);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      max-width: 360px;
    }

    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 16px 0;
      padding: 8px 0;
      background: linear-gradient(180deg, rgba(247, 250, 245, .98), rgba(247, 250, 245, .82));
      backdrop-filter: blur(14px);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 8px 22px rgba(24, 58, 43, .05);
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 900;
      transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      background: #f3f8f1;
      color: var(--ink);
    }

    .tab.active {
      color: #ffffff;
      background: linear-gradient(135deg, var(--grass-dark), var(--grass));
      box-shadow: 0 10px 22px rgba(31, 123, 73, .22);
    }

    .section {
      display: grid;
      gap: 16px;
      animation: fadeUp .22s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, .42fr);
      gap: 16px;
      align-items: start;
    }

    .card,
    .empty-state,
    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      box-shadow: var(--shadow-soft);
    }

    .card {
      overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-head,
    .card-body {
      padding: 18px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(223, 242, 229, .66), rgba(232, 246, 253, .46));
    }

    .card-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.22rem, 2.4vw, 1.65rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .card-kicker {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .input,
    .textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #ccd9cf;
      border-radius: 14px;
      background: #ffffff;
      color: var(--ink);
      outline: 0;
      padding: 10px 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8);
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--grass);
      box-shadow: 0 0 0 4px rgba(72, 168, 104, .15);
    }

    .textarea {
      min-height: 280px;
      resize: vertical;
      line-height: 1.5;
    }

    .input:disabled,
    .textarea:disabled {
      color: #7a837e;
      background: #f2f5f1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 14px;
      border-radius: 14px;
      color: var(--ink);
      background: #eef5ee;
      border: 1px solid rgba(31, 123, 73, .12);
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(24, 58, 43, .11);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .btn.primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--grass-dark), var(--grass));
      box-shadow: 0 11px 24px rgba(31, 123, 73, .22);
    }

    .btn.blue {
      background: var(--blue-soft);
      border-color: rgba(66, 151, 194, .26);
    }

    .btn.pink {
      background: var(--pink-soft);
      border-color: rgba(203, 90, 130, .2);
    }

    .btn.danger {
      color: #9f2e2c;
      background: #fff0ef;
      border-color: rgba(230, 105, 103, .28);
    }

    .btn.icon {
      width: 42px;
      padding: 0;
    }

    .player-list,
    .assignment-grid,
    .team-pool,
    .match-list,
    .qualifier-grid {
      display: grid;
      gap: 10px;
    }

    .player-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
    }

    .restricted-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid rgba(246, 199, 92, .54);
      border-radius: 999px;
      background: #fff9e6;
      font-size: .86rem;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
    }

    .restricted-toggle input {
      width: 17px;
      height: 17px;
      accent-color: var(--yellow);
    }

    .restricted-toggle.disabled {
      cursor: default;
      opacity: .72;
    }

    .small-note {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
    }

    .notice,
    .empty-state {
      padding: 16px;
    }

    .notice {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: linear-gradient(135deg, rgba(255, 246, 216, .9), rgba(255, 255, 255, .86));
    }

    .notice.good {
      background: linear-gradient(135deg, rgba(223, 242, 229, .95), rgba(255, 255, 255, .88));
    }

    .notice.danger {
      background: linear-gradient(135deg, rgba(255, 240, 239, .95), rgba(255, 255, 255, .88));
    }

    .notice strong {
      display: block;
      margin-bottom: 3px;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 180px;
      text-align: center;
      color: var(--muted);
      background:
        linear-gradient(135deg, rgba(223, 242, 229, .54), rgba(232, 246, 253, .45)),
        #ffffff;
    }

    .empty-state .big {
      display: block;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .team-card,
    .assignment-card,
    .qualifier-card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 70px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
    }

    .assignment-grid {
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .assignment-card {
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .assignment-card.revealed {
      animation: revealCard .35s ease both;
    }

    .assignment-card.hidden-card {
      min-height: 86px;
      justify-content: center;
      color: var(--grass-dark);
      background:
        linear-gradient(135deg, rgba(223, 242, 229, .95), rgba(232, 246, 253, .95));
    }

    @keyframes revealCard {
      from {
        opacity: 0;
        transform: rotateY(18deg) translateY(8px);
      }
      to {
        opacity: 1;
        transform: rotateY(0) translateY(0);
      }
    }

    .team-pool {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .team-card {
      min-height: 58px;
    }

    .team-card.forbidden {
      background: #fff4f3;
      border-color: rgba(230, 105, 103, .25);
    }

    .team-mark {
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-weight: 950;
      letter-spacing: 0;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .68), 0 8px 18px rgba(24, 58, 43, .12);
    }

    .team-mark.flag {
      font-size: 1.8rem;
      background: #f3f7f1;
    }

    .team-mark.club {
      color: #ffffff;
      font-size: .73rem;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      text-shadow: 0 1px 2px rgba(0, 0, 0, .28);
    }

    .team-meta {
      min-width: 0;
    }

    .team-meta strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .team-meta span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 750;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .progress-bar {
      overflow: hidden;
      height: 12px;
      border-radius: 999px;
      background: #e7efe6;
    }

    .progress-fill {
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--grass), var(--blue), var(--pink));
      transition: width .24s ease;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .group-card {
      min-width: 0;
    }

    .table-scroll {
      overflow-x: auto;
      padding: 0 0 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
      font-size: .9rem;
    }

    th,
    td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      white-space: nowrap;
    }

    th {
      color: #39534a;
      background: #edf6ed;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    td.name-cell,
    th.name-cell {
      text-align: left;
      min-width: 170px;
    }

    tbody tr:nth-child(even) {
      background: #fbfdfb;
    }

    tr.qualified {
      background: rgba(223, 242, 229, .72);
      box-shadow: inset 4px 0 0 var(--grass);
    }

    tr.third-qualified {
      background: rgba(232, 246, 253, .86);
      box-shadow: inset 4px 0 0 #4c9bc0;
    }

    .standing-player {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 900;
    }

    .standing-player .team-mark {
      width: 30px;
      height: 30px;
      font-size: .64rem;
    }

    .standing-player .team-mark.flag {
      font-size: 1.28rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef5ee;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 950;
    }

    .badge.classified {
      color: var(--grass-dark);
      background: var(--grass-soft);
    }

    .badge.warning {
      color: #76500a;
      background: #fff1c6;
    }

    .badge.done {
      color: var(--grass-dark);
      background: var(--grass-soft);
    }

    .match-list {
      margin-top: 14px;
    }

    .match-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
    }

    .match-card.done {
      border-color: rgba(72, 168, 104, .36);
      background: linear-gradient(135deg, rgba(223, 242, 229, .56), #ffffff);
    }

    .match-side {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .match-side.right {
      flex-direction: row-reverse;
      text-align: right;
    }

    .match-side .team-mark {
      width: 34px;
      height: 34px;
      font-size: .63rem;
    }

    .match-side .team-mark.flag {
      font-size: 1.35rem;
    }

    .match-name {
      min-width: 0;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .match-team {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
    }

    .score-box {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px;
      border-radius: 999px;
      background: #f3f8f2;
    }

    .score-input {
      width: 52px;
      height: 40px;
      border: 1px solid #ccd9cf;
      border-radius: 12px;
      text-align: center;
      font-weight: 950;
      color: var(--ink);
      background: #ffffff;
    }

    .score-input:focus {
      outline: 0;
      border-color: var(--grass);
      box-shadow: 0 0 0 3px rgba(72, 168, 104, .15);
    }

    .score-dash {
      color: var(--muted);
      font-weight: 950;
    }

    .section-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .section-actions > div {
      min-width: 0;
    }

    .qualifier-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .qualifier-card {
      align-items: flex-start;
    }

    .bracket {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(280px, 1fr);
      gap: 16px;
      overflow-x: auto;
      padding: 2px 0 10px;
    }

    .round {
      display: grid;
      align-content: start;
      gap: 12px;
      min-width: 280px;
    }

    .round-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.28rem;
    }

    .ko-match {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .ko-match.done {
      border-color: rgba(72, 168, 104, .36);
      background: linear-gradient(145deg, rgba(223, 242, 229, .6), #ffffff);
    }

    .ko-player {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
    }

    .ko-player .team-mark {
      width: 34px;
      height: 34px;
      font-size: .6rem;
    }

    .ko-player .team-mark.flag {
      font-size: 1.32rem;
    }

    .ko-name {
      min-width: 0;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .ko-seed {
      color: var(--muted);
      font-size: .75rem;
      font-weight: 850;
    }

    .penalty-input {
      width: 42px;
      height: 34px;
      border: 1px solid #d6ded7;
      border-radius: 10px;
      text-align: center;
      font-size: .86rem;
      font-weight: 950;
      background: #f8fbf7;
    }

    .winner-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      color: var(--grass-dark);
      font-size: .86rem;
      font-weight: 950;
    }

    .champion {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid rgba(246, 199, 92, .7);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 246, 216, .9), rgba(255, 255, 255, .82)),
        linear-gradient(90deg, var(--pink-soft), var(--blue-soft));
      box-shadow: var(--shadow);
    }

    .champion h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .96;
    }

    .champion p {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 800;
    }

    .champion-cup {
      display: grid;
      place-items: center;
      width: clamp(80px, 16vw, 140px);
      height: clamp(80px, 16vw, 140px);
      border-radius: 50%;
      background: linear-gradient(135deg, #fff7c8, #f6c75c);
      font-size: clamp(2.6rem, 8vw, 5rem);
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, .5), 0 18px 34px rgba(120, 83, 7, .18);
    }

    .confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti span {
      position: absolute;
      top: -18px;
      left: var(--x);
      width: 10px;
      height: 16px;
      border-radius: 3px;
      background: var(--c);
      animation: fall var(--d) linear infinite;
      animation-delay: var(--delay);
      transform: rotate(var(--r));
    }

    @keyframes fall {
      to {
        transform: translateY(320px) rotate(calc(var(--r) + 280deg));
      }
    }

    .rules-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, .55fr);
      gap: 16px;
      align-items: start;
    }

    .rules-preview {
      min-height: 280px;
      line-height: 1.55;
    }

    .rules-preview h3 {
      margin: 14px 0 8px;
      font-family: var(--font-display);
      font-size: 1.35rem;
    }

    .rules-preview h3:first-child,
    .rules-preview p:first-child {
      margin-top: 0;
    }

    .rules-preview ul {
      margin: 8px 0;
      padding-left: 22px;
    }

    .rules-preview li {
      margin: 4px 0;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 13px 15px;
      border: 1px solid rgba(31, 123, 73, .18);
      border-radius: 16px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-weight: 850;
      animation: toastIn .2s ease both;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .hero,
      .grid-2,
      .rules-layout {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
        max-width: none;
      }

      .tabs {
        display: flex;
        overflow-x: auto;
      }

      .tab {
        flex: 0 0 auto;
      }

      .section-actions {
        align-items: stretch;
      }

      .section-actions .toolbar {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(100% - 18px, 1320px);
        padding-top: 9px;
      }

      .hero {
        border-radius: 22px;
      }

      .hero::before,
      .hero::after {
        display: none;
      }

      .card-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .form-row,
      .player-row,
      .match-card {
        grid-template-columns: 1fr;
      }

      .match-side.right {
        flex-direction: row;
        text-align: left;
      }

      .score-box {
        justify-content: center;
        border-radius: 14px;
      }

      .btn,
      .top-actions .btn {
        width: 100%;
      }

      .restricted-toggle {
        width: 100%;
        justify-content: center;
      }

      .champion {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .champion-cup {
        justify-self: center;
      }
    }
  </style>

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: .2;
      background-image:
        linear-gradient(30deg, transparent 48.5%, rgba(255, 255, 255, .08) 49%, rgba(255, 255, 255, .08) 50%, transparent 50.5%),
        linear-gradient(150deg, transparent 48.5%, rgba(255, 255, 255, .06) 49%, rgba(255, 255, 255, .06) 50%, transparent 50.5%);
      background-size: 72px 124px;
      mask-image: linear-gradient(90deg, black, transparent 70%);
    }

    ::selection {
      color: #08090b;
      background: var(--grass);
    }

    button,
    input,
    textarea {
      letter-spacing: 0;
    }

    .app-shell {
      width: 100%;
      max-width: 1680px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px;
    }

    .app-frame {
      display: grid;
      grid-template-columns: 252px minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 36px);
    }

    .side-panel {
      position: sticky;
      top: 18px;
      display: flex;
      flex-direction: column;
      align-self: start;
      min-height: calc(100vh - 36px);
      max-height: calc(100vh - 36px);
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      background: rgba(10, 11, 15, .66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(145%);
      -webkit-backdrop-filter: blur(28px) saturate(145%);

    body {
      background: #050606;
    }

    body::before {
      background:
        linear-gradient(180deg, rgba(5, 6, 6, .88), rgba(5, 6, 6, .96)),
        linear-gradient(90deg, rgba(184, 255, 56, .025), transparent 40%),
        #050606;
    }

    body::after {
      opacity: .12;
      background-image:
        linear-gradient(30deg, transparent 49%, rgba(255, 255, 255, .055) 49.5%, transparent 50%),
        linear-gradient(150deg, transparent 49%, rgba(184, 255, 56, .045) 49.5%, transparent 50%);
      mask-image: linear-gradient(90deg, black, transparent 76%);
    }

    .side-panel {
      border-color: rgba(255, 255, 255, .105);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .035), transparent 38%),
        rgba(7, 8, 8, .62);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .06),
        0 28px 80px rgba(0, 0, 0, .46);
      backdrop-filter: blur(34px) saturate(120%);
      -webkit-backdrop-filter: blur(34px) saturate(120%);
    }

    .brand-mark {
      color: #070808;
      background: var(--grass);
      box-shadow: 0 0 30px rgba(184, 255, 56, .14);
    }

    .tab {
      color: #8f9490;
    }

    .tab:hover {
      color: #f5f7f4;
      background: rgba(255, 255, 255, .05);
    }

    .tab.active {
      color: #070808;
      border-color: var(--grass);
      background: var(--grass);
      box-shadow: 0 10px 30px rgba(184, 255, 56, .1);
    }

    .mini-stat {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .035), transparent),
        rgba(255, 255, 255, .025);
    }

    .hero {
      min-height: 258px;
      padding: clamp(24px, 3vw, 38px);
      border-color: rgba(255, 255, 255, .14);
      background-image:
        linear-gradient(90deg, rgba(5, 7, 6, .95) 0%, rgba(5, 7, 6, .7) 43%, rgba(5, 7, 6, .08) 72%),
        linear-gradient(180deg, rgba(0, 0, 0, .12), rgba(0, 0, 0, .6)),
        var(--hero-image);
      background-position: center, center, right center;
      background-size: cover, cover, 78% auto;
      background-repeat: no-repeat;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .08),
        var(--shadow);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .hero::before {
      background:
        linear-gradient(120deg, rgba(184, 255, 56, .075), transparent 32%),
        linear-gradient(90deg, transparent 70%, rgba(0, 0, 0, .18));
    }

    .hero::after {
      width: 38%;
      background: linear-gradient(90deg, transparent, var(--grass));
      animation: headerSignal 5s ease-in-out infinite;
    }

    .hero-content {
      max-width: 580px;
    }

    .hero h1 {
      max-width: 560px;
      color: #fff;
      text-shadow: 0 3px 28px rgba(0, 0, 0, .7);
    }

    .hero-subtitle {
      color: rgba(255, 255, 255, .78);
      text-shadow: 0 2px 14px rgba(0, 0, 0, .65);
    }

    .live-chip {
      border-color: rgba(184, 255, 56, .3);
      color: #e5ffba;
      background: rgba(6, 8, 7, .48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card,
    .empty-state,
    .notice {
      border-color: rgba(255, 255, 255, .105);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .032), transparent 34%),
        rgba(10, 12, 12, .62);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .045),
        var(--shadow-soft);
      backdrop-filter: blur(28px) saturate(112%);
      -webkit-backdrop-filter: blur(28px) saturate(112%);
    }

    .card-head {
      background: rgba(255, 255, 255, .028);
    }

    .title-with-icon {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .title-with-icon .ui-icon {
      width: 19px;
      height: 19px;
      color: var(--grass);
    }

    .ui-icon {
      display: inline-block;
      flex: 0 0 auto;
      width: 17px;
      height: 17px;
      vertical-align: -3px;
    }

    .btn .ui-icon {
      width: 16px;
      height: 16px;
      vertical-align: 0;
    }

    .empty-icon {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      border: 1px solid rgba(184, 255, 56, .2);
      border-radius: 7px;
      color: var(--grass);
      background: rgba(184, 255, 56, .06);
    }

    .empty-icon .ui-icon {
      width: 24px;
      height: 24px;
    }

    .notice > .ui-icon {
      width: 19px;
      height: 19px;
      margin-top: 1px;
      color: var(--grass);
    }

    .pill,
    .pill.blue,
    .pill.pink,
    .pill.warn {
      border-color: rgba(255, 255, 255, .11);
      color: #d7dbd8;
      background: rgba(8, 10, 9, .54);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .pill.good {
      border-color: rgba(184, 255, 56, .24);
      color: #dcffa0;
      background: rgba(184, 255, 56, .085);
    }

    .btn,
    .btn.blue,
    .btn.pink,
    .btn.danger {
      border-color: rgba(255, 255, 255, .11);
      color: #e3e6e3;
      background: rgba(255, 255, 255, .045);
    }

    .btn:hover:not(:disabled),
    .btn.blue:hover:not(:disabled),
    .btn.pink:hover:not(:disabled),
    .btn.danger:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, .22);
      color: #fff;
      background: rgba(255, 255, 255, .085);
    }

    .btn.primary,
    .btn.primary:hover:not(:disabled) {
      border-color: var(--grass);
      color: #070808;
      background: var(--grass);
    }

    .progress-fill {
      background: linear-gradient(90deg, #75a91e, var(--grass), #f5f7f4);
    }

    .input:focus,
    .textarea:focus,
    .score-input:focus,
    .penalty-input:focus {
      border-color: var(--grass);
      box-shadow: 0 0 0 3px rgba(184, 255, 56, .1);
    }

    .restricted-toggle {
      border-color: rgba(255, 255, 255, .12);
      color: #e5e8e5;
      background: rgba(255, 255, 255, .035);
    }

    .restricted-toggle:has(input:checked) {
      border-color: rgba(184, 255, 56, .3);
      color: #e3ffb2;
      background: rgba(184, 255, 56, .08);
    }

    .player-row,
    .team-card,
    .assignment-card,
    .qualifier-card,
    .match-card {
      border-color: rgba(255, 255, 255, .09);
      background: rgba(255, 255, 255, .03);
    }

    .team-card.forbidden {
      border-color: rgba(255, 255, 255, .09);
      background: rgba(255, 255, 255, .03);
    }

    .team-mark,
    .team-mark.logo {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      padding: 4px;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .team-mark.logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 7px 8px rgba(0, 0, 0, .34));
    }

    .standing-player .team-mark,
    .match-side .team-mark,
    .ko-player .team-mark {
      padding: 2px;
    }

    tr.qualified {
      background: rgba(184, 255, 56, .065);
    }

    tr.third-qualified {
      background: rgba(255, 255, 255, .045);
      box-shadow: inset 3px 0 0 rgba(255, 255, 255, .48);
    }

    .badge.warning,
    .badge.classified,
    .badge.done {
      border-color: rgba(184, 255, 56, .18);
      color: #dcffa0;
      background: rgba(184, 255, 56, .07);
    }

    .phase-visual,
    .knockout-panel {
      position: relative;
      isolation: isolate;
      background-image:
        linear-gradient(90deg, rgba(6, 8, 7, .95), rgba(6, 8, 7, .72) 58%, rgba(6, 8, 7, .84)),
        linear-gradient(180deg, rgba(0, 0, 0, .18), rgba(0, 0, 0, .74)),
        var(--stadium-image);
      background-position: center;
      background-size: cover;
      background-attachment: local;
    }

    .phase-visual::after,
    .knockout-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(184, 255, 56, .045), transparent 38%);
    }

    .phase-visual .card-head,
    .phase-visual .card-body,
    .knockout-panel .card-head,
    .knockout-panel .card-body {
      background: rgba(6, 8, 7, .44);
      backdrop-filter: blur(11px);
      -webkit-backdrop-filter: blur(11px);
    }

    .bracket {
      background: rgba(4, 5, 5, .32);
      border-radius: 7px;
    }

    .ko-match {
      border-color: rgba(255, 255, 255, .12);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .045), transparent),
        rgba(7, 9, 8, .78);
      backdrop-filter: blur(22px) saturate(105%);
      -webkit-backdrop-filter: blur(22px) saturate(105%);
    }

    .round:not(:last-child) .ko-match::after {
      background: linear-gradient(90deg, rgba(184, 255, 56, .16), var(--grass), rgba(255, 255, 255, .8), rgba(184, 255, 56, .16));
      box-shadow: 0 0 10px rgba(184, 255, 56, .24);
    }

    .round:not(:last-child) .ko-match::before {
      background: var(--grass);
      box-shadow: 0 0 12px var(--grass);
    }

    .champion {
      background-image:
        linear-gradient(90deg, rgba(5, 7, 6, .94), rgba(5, 7, 6, .58)),
        var(--stadium-image);
      background-position: center 58%;
      background-size: cover;
    }

    .champion::after {
      background: linear-gradient(110deg, rgba(184, 255, 56, .12), transparent 52%);
    }

    .champion-cup {
      color: #070808;
      background: var(--grass);
    }

    .champion-cup .ui-icon {
      width: 48%;
      height: 48%;
    }

    .confetti span {
      border-radius: 1px;
    }

    @media (max-width: 820px) {
      .hero {
        min-height: 236px;
        background-position: center, center, right center;
        background-size: cover, cover, 92% auto;
      }
    }

    @media (max-width: 640px) {
      .hero {
        min-height: 360px;
        padding-top: 168px;
        background-image:
          linear-gradient(180deg, rgba(5, 7, 6, .08), rgba(5, 7, 6, .92) 58%),
          var(--hero-image);
        background-position: center, center top;
        background-size: cover, auto 55%;
        background-repeat: no-repeat;
      }

      .hero-content {
        align-self: end;
      }

      .hero h1 {
        font-size: clamp(2.15rem, 12vw, 3.2rem);
      }
    }
  </style>
</head>

      const TEAM_BY_NAME = new Map(TEAMS.map((team) => [team.name, team]));
      const app = document.getElementById("app");
      const toast = document.getElementById("toast");
      let toastTimer = null;
      let revealTimer = null;
      let revealCount = Infinity;

      let state = loadState();

      function defaultState() {
        return {
          players: [],
          assignments: [],
          groups: [],
          groupMatches: [],
          knockout: null,
          rulesText: "",
          activeTab: "players",
          updatedAt: Date.now()
        };
      }

      function loadState() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return defaultState();
          return normalizeState(JSON.parse(saved));
        } catch (error) {
          console.warn(error);
          return defaultState();
        }
      }

      function normalizeState(input) {
        const base = defaultState();
        const incoming = input && typeof input === "object" ? input : {};
        return {
          ...base,
          ...incoming,
          players: Array.isArray(incoming.players) ? incoming.players : [],
          assignments: Array.isArray(incoming.assignments) ? incoming.assignments : [],
          groups: Array.isArray(incoming.groups) ? incoming.groups : [],
          groupMatches: Array.isArray(incoming.groupMatches) ? incoming.groupMatches : [],
          knockout: incoming.knockout || null,
          rulesText: typeof incoming.rulesText === "string" ? incoming.rulesText : "",
          activeTab: incoming.activeTab || "players"
        };
      }

      function saveState() {
        state.updatedAt = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function uid(prefix) {
        if (crypto && typeof crypto.randomUUID === "function") {
          return `${prefix}-${crypto.randomUUID()}`;
        }
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function shuffle(items) {
        const copy = [...items];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function notify(message) {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.remove("hidden");
        toastTimer = setTimeout(() => toast.classList.add("hidden"), 3300);
      }

      function playerById(playerId) {
        return state.players.find((player) => player.id === playerId) || null;
      }

      function assignmentByPlayer(playerId) {
        return state.assignments.find((assignment) => assignment.playerId === playerId) || null;
      }

      function teamForPlayer(playerId) {
        const assignment = assignmentByPlayer(playerId);
        return assignment ? TEAM_BY_NAME.get(assignment.teamName) : null;
      }

      function hasDraw() {
        return state.assignments.length > 0;
      }

      function restrictedCount() {
        return state.players.filter((player) => player.restricted).length;
      }

      function canDraw() {
        return state.players.length >= 15 && state.players.length <= 20 && restrictedCount() === 4;
      }

      function allGroupMatchesComplete() {
        return state.groupMatches.length > 0 && state.groupMatches.every((match) => match.saved);
      }

      function progressValue(done, total) {
        if (!total) return "0%";
        return `${Math.round((done / total) * 100)}%`;
      }

      function teamMark(teamName) {
        const team = TEAM_BY_NAME.get(teamName);
        if (!team) {
          return `<span class="team-mark logo placeholder" aria-hidden="true">${uiIcon("shield")}</span>`;
        }
        return `<span class="team-mark logo" aria-hidden="true"><img src="${team.logo}" alt="" loading="lazy"></span>`;
      }

      function playerTeamLine(playerId) {
        const player = playerById(playerId);
        const team = teamForPlayer(playerId);
        return {
          playerName: player ? player.name : "A definir",
          teamName: team ? team.name : "Sem time",
          mark: team ? teamMark(team.name) : `<span class="team-mark logo placeholder" aria-hidden="true">${uiIcon("shield")}</span>`
        };
      }

      function navIcon(id) {
        const paths = {
          players: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
          draw: `<rect width="18" height="18" x="3" y="3" rx="2"/><path d="m16 8 2-2-2-2"/><path d="M18 6h-5a4 4 0 0 0-4 4"/><path d="m8 16-2 2 2 2"/><path d="M6 18h5a4 4 0 0 0 4-4"/>`,
          groups: `<path d="M3 3v18h18"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-3"/>`,
          knockout: `<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 6H4v2a4 4 0 0 0 4 4"/><path d="M17 6h3v2a4 4 0 0 1-4 4"/>`,
          rules: `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/>`
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[id]}</svg>`;
      }

      function uiIcon(id) {
        const paths = {
          users: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
          plus: `<path d="M12 5v14M5 12h14"/>`,
          trash: `<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/>`,
          shuffle: `<path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="m4 4 5 5"/>`,
          chart: `<path d="M3 3v18h18"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-3"/>`,
          document: `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8"/>`,
          trophy: `<path d="M8 21h8M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 6H4v2a4 4 0 0 0 4 4M17 6h3v2a4 4 0 0 1-4 4"/>`,
