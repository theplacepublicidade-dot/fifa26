        };
        return `<svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[id] || paths.shield}</svg>`;
      }

      function render() {
        const doneMatches = state.groupMatches.filter((match) => match.saved).length;
        app.innerHTML = `
          <div class="app-frame">
            <aside class="side-panel" aria-label="Painel de navegação">
              <div class="brand-lockup">
                <div class="brand-mark" aria-hidden="true">FF</div>
                <div class="brand-copy">
                  <strong>FUTFRALDA</strong>
                  <span>Copinha FC 26</span>
                </div>
              </div>
              <div class="sidebar-label">Competição</div>
              ${renderTabs()}
              <div class="sidebar-label">Resumo ao vivo</div>
              <div class="sidebar-status">
                <div class="mini-stat"><strong>${state.players.length}/20</strong><span>Jogadores</span></div>
                <div class="mini-stat"><strong>${restrictedCount()}/4</strong><span>Restritos</span></div>
                <div class="mini-stat"><strong>${state.assignments.length ? "OK" : "—"}</strong><span>Sorteio</span></div>
                <div class="mini-stat"><strong>${doneMatches}/${state.groupMatches.length || 0}</strong><span>Jogos</span></div>
              </div>
              <div class="sidebar-actions" aria-label="Ações de arquivo">
                <button class="btn blue" type="button" data-action="export">Exportar dados</button>
                <label class="btn pink" for="importFile">Importar dados</label>
                <input id="importFile" class="hidden" type="file" accept="application/json,.json" data-action="import">
                <button class="btn danger" type="button" data-action="reset">Resetar torneio</button>
              </div>
            </aside>
            <div class="workspace">
              <header class="hero">
                <div class="hero-content">
                  <div class="eyebrow">Chá de fraldas · Luísa e Alice</div>
                  <h1>FUTFRALDA 26</h1>
                  <p class="hero-subtitle">A copinha delas.</p>
                  <div class="hero-stats">
                    <span class="pill good">${state.players.length}/20 jogadores</span>
                    <span class="pill warn">${restrictedCount()}/4 restritos</span>
                    <span class="pill blue">${state.assignments.length ? "Sorteio concluído" : "Times em aberto"}</span>
                    <span class="pill pink">${doneMatches}/${state.groupMatches.length || 0} jogos salvos</span>
                  </div>
                </div>
                <div class="live-chip">Painel ao vivo</div>
              </header>
              <main>
                ${renderActiveSection()}
              </main>
            </div>
          </div>
        `;
      }

      function renderTabs() {
        const tabs = [
          ["players", "Cadastro"],
          ["draw", "Sorteio"],
          ["groups", "Grupos"],
          ["knockout", "Mata-mata"],
          ["rules", "Regras"]
        ];
        return `
          <div class="tabs-wrap">
            <nav class="tabs" aria-label="Seções do painel">
              ${tabs.map(([id, label]) => `
                <button class="tab ${state.activeTab === id ? "active" : ""}" type="button" data-tab="${id}" aria-label="${label}" title="${label}">
                  ${navIcon(id)}
                  <span>${label}</span>
                </button>
              `).join("")}
            </nav>
          </div>
        `;
      }

      function renderActiveSection() {
        const tab = state.activeTab;
        if (tab === "draw") return renderDraw();
        if (tab === "groups") return renderGroups();
        if (tab === "knockout") return renderKnockout();
        if (tab === "rules") return renderRules();
        return renderPlayers();
      }

      function renderPlayers() {
        const locked = hasDraw();
        const count = state.players.length;
        return `
          <section class="section" aria-labelledby="playersTitle">
            <div class="players-layout">
              <article class="card">
                <div class="card-head">
                  <div>
                    <h2 id="playersTitle" class="card-title title-with-icon">${uiIcon("users")} Cadastro de Jogadores</h2>
                    <p class="card-kicker">${count}/20 jogadores confirmados</p>
                  </div>
                  <span class="pill ${count >= 15 ? "good" : "warn"}">${count >= 15 ? "Mínimo atingido" : `Faltam ${15 - count}`}</span>
                </div>
                <div class="card-body">
                  <form class="form-row" data-form="add-player">
                    <input class="input" name="playerName" type="text" placeholder="Nome do jogador" maxlength="34" ${locked || count >= 20 ? "disabled" : ""} required>
                    <button class="btn primary" type="submit" ${locked || count >= 20 ? "disabled" : ""}>${uiIcon("plus")} Adicionar</button>
                  </form>
                  ${locked ? `<p class="small-note">O cadastro fica travado depois do sorteio para proteger os resultados. Para mudar nomes ou restrições, refaça o sorteio.</p>` : ""}
                  <div class="progress-wrap">
                    <div class="progress-bar" aria-hidden="true"><div class="progress-fill" style="--value:${progressValue(count, 20)}"></div></div>
                    <div class="toolbar">
                      <span class="pill ${restrictedCount() === 4 ? "good" : "warn"}">${restrictedCount()}/4 restritos</span>
                      <span class="pill ${count <= 20 ? "blue" : "warn"}">Máximo 20</span>
                    </div>
                  </div>
                  <div class="player-list" style="margin-top:16px;">
                    ${state.players.length ? state.players.map((player, index) => renderPlayerRow(player, index, locked)).join("") : `
                      <div class="empty-state">
                        <div><span class="empty-icon">${uiIcon("ball")}</span><strong>Adicione os participantes da copinha.</strong><br>Com 15 a 20 jogadores, o sorteio fica liberado.</div>
                      </div>
                    `}
                  </div>
                </div>
              </article>
            </div>
          </section>
        `;
      }

      function renderPlayerRow(player, index, locked) {
        return `
          <div class="player-row">
            <input class="input" type="text" value="${escapeHtml(player.name)}" maxlength="34" data-player-name="${player.id}" aria-label="Nome do jogador ${index + 1}" ${locked ? "disabled" : ""}>
            <label class="restricted-toggle ${locked ? "disabled" : ""}">
              <input type="checkbox" data-player-restricted="${player.id}" ${player.restricted ? "checked" : ""} ${locked ? "disabled" : ""}>
              <span>Restrito</span>
            </label>
            <button class="btn icon danger" type="button" title="Remover jogador" aria-label="Remover ${escapeHtml(player.name)}" data-action="remove-player" data-player-id="${player.id}" ${locked ? "disabled" : ""}>${uiIcon("trash")}</button>
          </div>
        `;
      }

      function renderDraw() {
        const locked = hasDraw();
        const ready = canDraw();
        const revealLimit = Number.isFinite(revealCount) ? revealCount : state.assignments.length;
        return `
          <section class="section" aria-labelledby="drawTitle">
            <article class="card">
              <div class="card-head">
                <div>
                  <h2 id="drawTitle" class="card-title title-with-icon">${uiIcon("shuffle")} Sorteio de Equipes</h2>
                  <p class="card-kicker">1 time por jogador, sem repetição e respeitando os restritos.</p>
                </div>
                <div class="toolbar">
                  <button class="btn primary" type="button" data-action="draw-teams" ${ready ? "" : "disabled"}>${uiIcon("shuffle")} ${locked ? "Refazer sorteio" : "Sortear Times"}</button>
                  <button class="btn danger" type="button" data-action="clear-draw" ${locked ? "" : "disabled"}>Limpar sorteio</button>
                </div>
              </div>
              <div class="card-body">
                ${renderDrawReadiness()}
                ${state.assignments.length ? `
                  <div class="assignment-grid" style="margin-top:16px;">
                    ${state.assignments.map((assignment, index) => renderAssignmentCard(assignment, index, revealLimit)).join("")}
                  </div>
                ` : `
                  <div class="empty-state">
                    <div><span class="empty-icon">${uiIcon("shuffle")}</span><strong>O sorteio aparece aqui.</strong><br>Cadastre 15 a 20 jogadores e marque exatamente 4 restritos.</div>
                  </div>
                `}
              </div>
            </article>
            <article class="card">
              <div class="card-head">
                <div>
                  <h3 class="card-title">Pool de times</h3>
                  <p class="card-kicker">${TEAMS.length} opções disponíveis</p>
                </div>
              </div>
              <div class="card-body">
                <div class="team-pool">
                  ${TEAMS.map((team) => `
                    <div class="team-card">
                      ${teamMark(team.name)}
                      <div class="team-meta">
                        <strong>${escapeHtml(team.name)}</strong>
                        <span>${escapeHtml(team.kind)}</span>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </article>
          </section>
        `;
      }

      function renderDrawReadiness() {
        const pieces = [];
        if (state.players.length < 15) pieces.push(`faltam ${15 - state.players.length} jogadores`);
        if (state.players.length > 20) pieces.push("há jogadores acima do limite");
        if (restrictedCount() !== 4) pieces.push(`marque ${restrictedCount() < 4 ? `mais ${4 - restrictedCount()}` : `remova ${restrictedCount() - 4}`} restrito(s)`);
        if (!pieces.length) {
          return `
            <div class="notice good">
              ${uiIcon("check")}
              <div><strong>Tudo pronto para o sorteio.</strong><span class="small-note">Os grupos e as partidas da fase inicial serão gerados junto com os times.</span></div>
            </div>
          `;
        }
        return `
          <div class="notice">
            ${uiIcon("shield")}
            <div><strong>Ajustes antes de sortear</strong><span class="small-note">${pieces.join(" · ")}.</span></div>
          </div>
        `;
      }

      function renderAssignmentCard(assignment, index, revealLimit) {
        const player = playerById(assignment.playerId);
        if (index >= revealLimit) {
          return `<div class="assignment-card hidden-card"><strong>Revelando em instantes...</strong></div>`;
        }
        return `
          <div class="assignment-card revealed">
            ${teamMark(assignment.teamName)}
            <div class="team-meta">
              <strong>${escapeHtml(player ? player.name : "Jogador removido")}</strong>
              <span>${escapeHtml(assignment.teamName)}</span>
            </div>
          </div>
        `;
      }

      function renderGroups() {
        const done = state.groupMatches.filter((match) => match.saved).length;
        const total = state.groupMatches.length;
        const qualifiedMap = getQualifiedMap();
        return `
          <section class="section" aria-labelledby="groupsTitle">
            <article class="card phase-visual">
              <div class="card-head">
                <div>
                  <h2 id="groupsTitle" class="card-title title-with-icon">${uiIcon("chart")} Fase de Grupos</h2>
                  <p class="card-kicker">Todos contra todos, jogo único dentro de cada grupo.</p>
                </div>
                <div class="toolbar">
                  <span class="pill ${allGroupMatchesComplete() ? "good" : "warn"}">${done}/${total || 0} jogos salvos</span>
                  <button class="btn primary" type="button" data-action="generate-knockout" ${allGroupMatchesComplete() ? "" : "disabled"}>Gerar Mata-mata</button>
                </div>
              </div>
              <div class="card-body">
                ${!state.assignments.length ? `
                  <div class="empty-state">
                    <div><span class="empty-icon">${uiIcon("shuffle")}</span><strong>Faça o sorteio primeiro.</strong><br>Os grupos nascem automaticamente depois dos times.</div>
                  </div>
                ` : ""}
                ${state.assignments.length && !state.groups.length ? `
                  <div class="notice">
                    ${uiIcon("document")}
                    <div><strong>Grupos ainda não gerados.</strong><span class="small-note">Use o botão para montar a tabela com base no número de jogadores.</span></div>
                  </div>
                  <button class="btn primary" type="button" data-action="generate-groups">Gerar grupos</button>
                ` : ""}
                ${state.groups.length ? `
                  <div class="progress-wrap">
                    <div class="progress-bar" aria-hidden="true"><div class="progress-fill" style="--value:${progressValue(done, total)}"></div></div>
                    <span class="small-note">Os 2 primeiros de cada grupo avançam. Para 15 jogadores, os 2 melhores terceiros completam as quartas.</span>
                  </div>
                ` : ""}
              </div>
            </article>
            ${state.groups.length ? `
              <div class="group-grid">
                ${state.groups.map((group) => renderGroupCard(group, qualifiedMap)).join("")}
              </div>
            ` : ""}
          </section>
        `;
      }

      function renderGroupCard(group, qualifiedMap) {
        const standings = computeStandings(group.id);
        const matches = state.groupMatches.filter((match) => match.groupId === group.id);
        return `
          <article class="card group-card">
            <div class="card-head">
              <div>
                <h3 class="card-title">Grupo ${escapeHtml(group.name)}</h3>
                <p class="card-kicker">${group.playerIds.length} jogadores · ${matches.filter((match) => match.saved).length}/${matches.length} jogos</p>
              </div>
            </div>
            <div class="card-body">
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Pos</th>
                      <th class="name-cell">Jogador</th>
                      <th>P</th>
                      <th>J</th>
                      <th>V</th>
                      <th>E</th>
                      <th>D</th>
                      <th>GP</th>
                      <th>GC</th>
                      <th>SG</th>
                      <th>Nota</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${standings.map((row, index) => renderStandingRow(row, index, matches, qualifiedMap)).join("")}
                  </tbody>
                </table>
              </div>
              <div class="match-list">
                ${matches.map((match) => renderGroupMatch(match)).join("")}
              </div>
            </div>
          </article>
        `;
      }

      function renderStandingRow(row, index, matches, qualifiedMap) {
        const qualified = qualifiedMap.get(row.playerId);
        const needsOddEven = hasUnresolvedTie(row, matches);
        const cssClass = qualified ? (qualified.kind === "third" ? "third-qualified" : "qualified") : "";
        return `
          <tr class="${cssClass}">
            <td>${index + 1}</td>
            <td class="name-cell">
              <span class="standing-player">${teamMark(row.teamName)} <span>${escapeHtml(row.name)}</span></span>
            </td>
            <td><strong>${row.P}</strong></td>
            <td>${row.J}</td>
            <td>${row.V}</td>
            <td>${row.E}</td>
            <td>${row.D}</td>
            <td>${row.GP}</td>
            <td>${row.GC}</td>
            <td>${row.SG}</td>
            <td>
              ${qualified ? `<span class="badge classified">${qualified.kind === "third" ? "melhor 3º" : "class."}</span>` : ""}
              ${needsOddEven ? `<span class="badge warning">par ou ímpar</span>` : ""}
            </td>
          </tr>
        `;
      }

      function renderGroupMatch(match) {
        const home = playerTeamLine(match.homeId);
        const away = playerTeamLine(match.awayId);
        return `
          <div class="match-card ${match.saved ? "done" : ""}">
            <div class="match-side">
              ${home.mark}
              <div class="match-name">${escapeHtml(home.playerName)}<span class="match-team">${escapeHtml(home.teamName)}</span></div>
            </div>
            <div class="score-box" aria-label="Placar">
              <input id="gm-${match.id}-home" class="score-input" type="number" min="0" max="99" inputmode="numeric" value="${match.homeGoals ?? ""}" aria-label="Gols de ${escapeHtml(home.playerName)}">
              <span class="score-dash">×</span>
              <input id="gm-${match.id}-away" class="score-input" type="number" min="0" max="99" inputmode="numeric" value="${match.awayGoals ?? ""}" aria-label="Gols de ${escapeHtml(away.playerName)}">
            </div>
            <div class="match-side right">
              ${away.mark}
              <div class="match-name">${escapeHtml(away.playerName)}<span class="match-team">${escapeHtml(away.teamName)}</span></div>
            </div>
            <button class="btn ${match.saved ? "" : "primary"}" type="button" data-action="save-group-match" data-match-id="${match.id}">
              ${match.saved ? "Atualizar" : "Salvar"}
            </button>
          </div>
        `;
      }

      function renderKnockout() {
        const qualifiers = getQualifiedList();
        return `
          <section class="section" aria-labelledby="knockoutTitle">
            ${state.knockout && state.knockout.championId ? renderChampion(state.knockout.championId) : ""}
            <article class="card knockout-panel">
              <div class="card-head">
                <div>
                  <h2 id="knockoutTitle" class="card-title title-with-icon">${uiIcon("trophy")} Mata-mata</h2>
                  <p class="card-kicker">Empate no tempo normal pede placar de pênaltis.</p>
                </div>
                <div class="toolbar">
                  <button class="btn primary" type="button" data-action="generate-knockout" ${allGroupMatchesComplete() ? "" : "disabled"}>${state.knockout ? "Refazer chaveamento" : "Gerar Mata-mata"}</button>
                </div>
              </div>
              <div class="card-body">
                ${!state.groups.length ? `
                  <div class="empty-state">
                    <div><span class="empty-icon">${uiIcon("chart")}</span><strong>A fase de grupos ainda não existe.</strong><br>Faça o sorteio para montar grupos e partidas.</div>
                  </div>
                ` : ""}
                ${state.groups.length && !allGroupMatchesComplete() ? `
                  <div class="notice">
                    ${uiIcon("clock")}
                    <div><strong>Finalize os grupos para gerar a chave.</strong><span class="small-note">Ainda faltam ${state.groupMatches.filter((match) => !match.saved).length} partida(s) salvas.</span></div>
                  </div>
                ` : ""}
                ${state.groups.length && !state.knockout ? renderQualifierPreview(qualifiers) : ""}
                ${state.knockout ? renderBracket() : ""}
              </div>
            </article>
          </section>
        `;
      }

      function renderQualifierPreview(qualifiers) {
        if (!qualifiers.length) return "";
        return `
          <div class="notice good">
            ${uiIcon("check")}
            <div><strong>${qualifiers.length} classificados previstos</strong><span class="small-note">A chave cruza líderes contra vices de outros grupos sempre que possível.</span></div>
          </div>
          <div class="qualifier-grid" style="margin-top:14px;">
            ${qualifiers.map((entry) => renderQualifierCard(entry)).join("")}
          </div>
        `;
      }

      function renderQualifierCard(entry) {
        const details = playerTeamLine(entry.playerId);
        return `
          <div class="qualifier-card">
            ${details.mark}
            <div class="team-meta">
              <strong>${escapeHtml(details.playerName)}</strong>
              <span>Grupo ${escapeHtml(entry.groupName)} · ${entry.rank}º lugar${entry.kind === "third" ? " · melhor 3º" : ""}</span>
            </div>
          </div>
        `;
      }

      function renderBracket() {
        const firstRoundMatches = state.knockout.rounds[0]?.matches.length || 1;
        const bracketHeight = Math.max(520, firstRoundMatches * 178);
        return `
          <div class="bracket" style="--bracket-height:${bracketHeight}px" aria-label="Chaveamento do mata-mata">
            ${state.knockout.rounds.map((round, roundIndex) => `
              <section class="round">
                <h3 class="round-title">${escapeHtml(round.name)}</h3>
                <div class="round-matches">
                  ${round.matches.map((match, matchIndex) => renderKnockoutMatch(match, roundIndex, matchIndex)).join("")}
                </div>
              </section>
            `).join("")}
          </div>
        `;
      }

      function renderKnockoutMatch(match, roundIndex, matchIndex) {
        const ready = Boolean(match.homeId && match.awayId);
        return `
          <div class="ko-match ${match.saved ? "done" : ""}">
            <div class="badge">${escapeHtml(match.label || `Jogo ${matchIndex + 1}`)}</div>
            ${renderKnockoutPlayer(match, "home", roundIndex)}
            ${renderKnockoutPlayer(match, "away", roundIndex)}
            <div class="winner-row">
              <span>${match.winnerId ? `Vencedor: ${escapeHtml(playerById(match.winnerId)?.name || "A definir")}` : "Aguardando vencedor"}</span>
              <button class="btn ${match.saved ? "" : "primary"}" type="button" data-action="save-ko-match" data-round="${roundIndex}" data-match-index="${matchIndex}" ${ready ? "" : "disabled"}>
                ${match.saved ? "Atualizar" : "Salvar"}
              </button>
            </div>
          </div>
        `;
      }

      function renderKnockoutPlayer(match, side, roundIndex) {
        const playerId = match[`${side}Id`];
        const details = playerId ? playerTeamLine(playerId) : {
          playerName: "Aguardando",
          teamName: "Vencedor anterior",
          mark: `<span class="team-mark logo placeholder" aria-hidden="true">${uiIcon("shield")}</span>`
        };
        const goals = match[`${side}Goals`] ?? "";
        const penalties = match[`${side}Penalties`] ?? "";
        const seed = match[`${side}Seed`] || (roundIndex === 0 ? "" : "vem da fase anterior");
        return `
          <div class="ko-player">
            ${details.mark}
            <div class="ko-name">
              ${escapeHtml(details.playerName)}
              <div class="ko-seed">${escapeHtml(seed)} · ${escapeHtml(details.teamName)}</div>
            </div>
            <input id="ko-${match.id}-${side}-goals" class="score-input" type="number" min="0" max="99" inputmode="numeric" value="${goals}" aria-label="Gols de ${escapeHtml(details.playerName)}" ${playerId ? "" : "disabled"}>
            <input id="ko-${match.id}-${side}-pen" class="penalty-input" type="number" min="0" max="99" inputmode="numeric" value="${penalties}" title="Pênaltis" aria-label="Pênaltis de ${escapeHtml(details.playerName)}" ${playerId ? "" : "disabled"}>
          </div>
        `;
      }

      function renderChampion(playerId) {
        const details = playerTeamLine(playerId);
        const confetti = Array.from({ length: 36 }, (_, index) => {
          const colors = ["#b8ff38", "#f5f7f4", "#707570", "#b8ff38", "#ffffff"];
          return `<span style="--x:${(index * 29) % 100}%;--c:${colors[index % colors.length]};--d:${2.8 + (index % 8) * .22}s;--delay:${-(index % 12) * .22}s;--r:${(index * 37) % 180}deg"></span>`;
        }).join("");
        return `
          <section class="champion" aria-label="Campeão do FUTFRALDA">
            <div class="confetti" aria-hidden="true">${confetti}</div>
            <div class="champion-cup" aria-hidden="true">${uiIcon("trophy")}</div>
            <div>
              <h2>CAMPEÃO DO FUTFRALDA</h2>
              <p>${escapeHtml(details.playerName)} levantou a taça com ${escapeHtml(details.teamName)}.</p>
            </div>
          </section>
        `;
      }

      function renderRules() {
        return `
          <section class="section" aria-labelledby="rulesTitle">
            <article class="card">
              <div class="card-head">
                <div>
                  <h2 id="rulesTitle" class="card-title title-with-icon">${uiIcon("document")} Painel de Regras</h2>
                  <p class="card-kicker">Cole, edite e consulte as regras durante o evento.</p>
                </div>
              </div>
              <div class="card-body rules-layout">
                <div>
                  <textarea class="textarea" data-rules-text placeholder="Cole as regras aqui. Use linhas iniciadas com - para listas e # para títulos.">${escapeHtml(state.rulesText)}</textarea>
                </div>
                <div class="card" style="box-shadow:none;">
                  <div class="card-head">
                    <div>
                      <h3 class="card-title">Consulta rápida</h3>
                      <p class="card-kicker">Prévia salva automaticamente</p>
                    </div>
                  </div>
                  <div id="rulesPreview" class="card-body rules-preview">${formatRules(state.rulesText)}</div>
                </div>
              </div>
            </article>
          </section>
        `;
      }

      function addPlayer(name) {
        const clean = name.trim().replace(/\s+/g, " ");
        if (!clean) {
          notify("Digite um nome para adicionar.");
          return;
        }
        if (hasDraw()) {
          notify("O cadastro está travado depois do sorteio.");
          return;
        }
        if (state.players.length >= 20) {
          notify("O limite é de 20 jogadores.");
          return;
        }
        if (state.players.some((player) => player.name.localeCompare(clean, "pt-BR", { sensitivity: "accent" }) === 0)) {
          notify("Esse nome já está na lista.");
          return;
        }
        state.players.push({ id: uid("player"), name: clean, restricted: false });
        saveState();
        render();
      }

      function updatePlayerName(playerId, name) {
        if (hasDraw()) return;
        const player = playerById(playerId);
        const clean = name.trim().replace(/\s+/g, " ");
        if (!player || !clean) {
          notify("O nome não pode ficar vazio.");
          render();
          return;
        }
        const duplicated = state.players.some((item) => item.id !== playerId && item.name.localeCompare(clean, "pt-BR", { sensitivity: "accent" }) === 0);
        if (duplicated) {
          notify("Já existe outro jogador com esse nome.");
          render();
          return;
        }
        player.name = clean;
        saveState();
        render();
      }

      function updateRestricted(playerId, checked) {
        if (hasDraw()) return;
        const player = playerById(playerId);
        if (!player) return;
        if (checked && !player.restricted && restrictedCount() >= 4) {
          notify("Já existem 4 jogadores restritos.");
          render();
          return;
        }
        player.restricted = checked;
        saveState();
        render();
      }

      function removePlayer(playerId) {
        if (hasDraw()) return;
        state.players = state.players.filter((player) => player.id !== playerId);
        saveState();
        render();
      }

      function clearDraw() {
        if (!hasDraw()) return;
        if (!confirm("Apagar sorteio, grupos, resultados e mata-mata?")) return;
        state.assignments = [];
        state.groups = [];
        state.groupMatches = [];
        state.knockout = null;
        revealCount = Infinity;
        clearInterval(revealTimer);
        saveState();
        render();
        notify("Sorteio e resultados apagados.");
      }

      function drawTeams() {
        if (!canDraw()) {
          notify("Para sortear: 15 a 20 jogadores e exatamente 4 restritos.");
          return;
        }
        if (hasDraw() && !confirm("Refazer o sorteio apaga grupos, placares e mata-mata. Continuar?")) {
          return;
        }

        // Sorteio: embaralha o pool completo e aceita somente permutações que respeitam a restrição.
        let assignments = null;
        for (let attempt = 0; attempt < 5000; attempt += 1) {
          const teams = shuffle(TEAMS).slice(0, state.players.length);
          const candidate = state.players.map((player, index) => ({
            playerId: player.id,
            teamName: teams[index].name
          }));
          const valid = candidate.every((assignment) => {
            const player = playerById(assignment.playerId);
            return !player?.restricted || !FORBIDDEN_FOR_RESTRICTED.has(assignment.teamName);
          });
          if (valid) {
            assignments = candidate;
            break;
          }
        }

        if (!assignments) {
          notify("Não foi possível montar um sorteio válido. Tente novamente.");
          return;
        }

        state.assignments = assignments;
        generateGroupsAndMatches();
        state.knockout = null;
        state.activeTab = "draw";
        saveState();
        startReveal(assignments.length);
        notify("Sorteio feito. Grupos e jogos foram montados.");
      }

      function startReveal(total) {
        clearInterval(revealTimer);
        revealCount = 0;
        render();
        revealTimer = setInterval(() => {
          revealCount += 1;
          render();
          if (revealCount >= total) {
            clearInterval(revealTimer);
            revealCount = Infinity;
          }
        }, 400);
      }

      function generateGroupsAndMatches() {
        const sizes = GROUP_SIZES[state.players.length];
        if (!sizes) {
          notify("Os grupos só podem ser gerados com 15 a 20 jogadores.");
          return;
        }

        // Geração de grupos: distribui jogadores embaralhados nos tamanhos oficiais do evento.
        const shuffledPlayers = shuffle(state.players.map((player) => player.id));
        let cursor = 0;
        state.groups = sizes.map((size, index) => {
          const playerIds = shuffledPlayers.slice(cursor, cursor + size);
          cursor += size;
          return {
            id: uid("group"),
            name: String.fromCharCode(65 + index),
            playerIds
          };
        });

        state.groupMatches = [];
        state.groups.forEach((group) => {
          for (let homeIndex = 0; homeIndex < group.playerIds.length; homeIndex += 1) {
            for (let awayIndex = homeIndex + 1; awayIndex < group.playerIds.length; awayIndex += 1) {
              state.groupMatches.push({
                id: uid("gm"),
                groupId: group.id,
                homeId: group.playerIds[homeIndex],
                awayId: group.playerIds[awayIndex],
                homeGoals: null,
                awayGoals: null,
                saved: false
              });
            }
          }
        });
        state.knockout = null;
      }

      function saveGroupMatch(matchId) {
        const match = state.groupMatches.find((item) => item.id === matchId);
        if (!match) return;
        const homeInput = document.getElementById(`gm-${match.id}-home`);
        const awayInput = document.getElementById(`gm-${match.id}-away`);
        const homeGoals = parseScore(homeInput?.value);
        const awayGoals = parseScore(awayInput?.value);
        if (homeGoals === null || awayGoals === null) {
          notify("Informe placares válidos para os dois lados.");
          return;
        }
        match.homeGoals = homeGoals;
        match.awayGoals = awayGoals;
        match.saved = true;
        if (state.knockout) {
          state.knockout = null;
          notify("Resultado salvo. O mata-mata foi limpo para refletir a nova classificação.");
        } else {
          notify("Resultado salvo.");
        }
        saveState();
        render();
      }

      function parseScore(value) {
        if (value === "" || value === null || value === undefined) return null;
        const number = Number(value);
        if (!Number.isInteger(number) || number < 0 || number > 99) return null;
        return number;
      }

      function computeStandings(groupId) {
        const group = state.groups.find((item) => item.id === groupId);
        if (!group) return [];
        const rows = new Map();
        group.playerIds.forEach((playerId) => {
          const player = playerById(playerId);
          const team = teamForPlayer(playerId);
          rows.set(playerId, {
            playerId,
            name: player?.name || "Jogador removido",
            teamName: team?.name || "Sem time",
            P: 0,
            J: 0,
            V: 0,
            E: 0,
            D: 0,
            GP: 0,
            GC: 0,
            SG: 0
          });
        });

        state.groupMatches
          .filter((match) => match.groupId === groupId && match.saved)
          .forEach((match) => {
            const home = rows.get(match.homeId);
            const away = rows.get(match.awayId);
            if (!home || !away) return;
            home.J += 1;
            away.J += 1;
            home.GP += match.homeGoals;
            home.GC += match.awayGoals;
            away.GP += match.awayGoals;
            away.GC += match.homeGoals;
            if (match.homeGoals > match.awayGoals) {
              home.V += 1;
              home.P += 3;
              away.D += 1;
            } else if (match.homeGoals < match.awayGoals) {
              away.V += 1;
              away.P += 3;
              home.D += 1;
            } else {
              home.E += 1;
              away.E += 1;
              home.P += 1;
              away.P += 1;
            }
          });

        const list = Array.from(rows.values()).map((row) => ({ ...row, SG: row.GP - row.GC }));
        const matches = state.groupMatches.filter((match) => match.groupId === groupId);

        // Desempate: pontos, saldo, gols pró, confronto direto e ordem alfabética como fallback visual.
        return list.sort((a, b) => compareStandingRows(a, b, matches));
      }

      function compareStandingRows(a, b, matches) {
        if (b.P !== a.P) return b.P - a.P;
        if (b.SG !== a.SG) return b.SG - a.SG;
        if (b.GP !== a.GP) return b.GP - a.GP;
        const direct = compareDirect(a.playerId, b.playerId, matches);
        if (direct !== 0) return direct;
        return a.name.localeCompare(b.name, "pt-BR");
      }

      function compareDirect(playerA, playerB, matches) {
        const match = matches.find((item) => item.saved && (
          (item.homeId === playerA && item.awayId === playerB) ||
          (item.homeId === playerB && item.awayId === playerA)
        ));
        if (!match || match.homeGoals === match.awayGoals) return 0;
        const homeWon = match.homeGoals > match.awayGoals;
        const aIsHome = match.homeId === playerA;
        return (homeWon && aIsHome) || (!homeWon && !aIsHome) ? -1 : 1;
      }

      function hasUnresolvedTie(row, matches) {
        return matches.some((match) => {
          if (!match.saved || (match.homeId !== row.playerId && match.awayId !== row.playerId)) return false;
          const otherId = match.homeId === row.playerId ? match.awayId : match.homeId;
          const groupId = match.groupId;
          const otherRow = computeStandings(groupId).find((candidate) => candidate.playerId === otherId);
          if (!otherRow) return false;
          return row.P === otherRow.P && row.SG === otherRow.SG && row.GP === otherRow.GP && compareDirect(row.playerId, otherId, matches) === 0;
        });
      }

      function getQualifiedMap() {
        const map = new Map();
        getQualifiedList().forEach((entry) => {
          map.set(entry.playerId, entry);
        });
        return map;
      }

      function getQualifiedList() {
        if (!state.groups.length) return [];
        const topTwo = [];
        const thirds = [];
        state.groups.forEach((group, groupIndex) => {
          const standings = computeStandings(group.id);
          standings.forEach((row, index) => {
            const entry = {
              playerId: row.playerId,
              groupId: group.id,
              groupIndex,
              groupName: group.name,
              rank: index + 1,
              kind: index < 2 ? "direct" : "third",
              stats: row
            };
            if (index < 2) topTwo.push(entry);
            if (index === 2) thirds.push(entry);
          });
        });

        const target = nextPowerOfTwo(topTwo.length);
        const neededThirds = Math.max(0, target - topTwo.length);
        thirds.sort(compareQualificationEntries);
        return [...topTwo, ...thirds.slice(0, neededThirds)];
      }

      function compareQualificationEntries(a, b) {
        if (b.stats.P !== a.stats.P) return b.stats.P - a.stats.P;
        if (b.stats.SG !== a.stats.SG) return b.stats.SG - a.stats.SG;
        if (b.stats.GP !== a.stats.GP) return b.stats.GP - a.stats.GP;
        if (b.stats.V !== a.stats.V) return b.stats.V - a.stats.V;
        return a.stats.name.localeCompare(b.stats.name, "pt-BR");
      }

      function nextPowerOfTwo(number) {
        let power = 1;
        while (power < number) power *= 2;
        return power;
      }

      function generateKnockout() {
        if (!allGroupMatchesComplete()) {
          notify("Salve todos os jogos da fase de grupos antes do mata-mata.");
          return;
        }
        if (state.knockout && !confirm("Refazer o chaveamento apaga placares do mata-mata. Continuar?")) {
          return;
        }
        const qualifiers = getQualifiedList();
        if (qualifiers.length < 2) {
          notify("Ainda não há classificados suficientes.");
          return;
        }

        // Chaveamento: prioriza 1º x 2º de grupos diferentes; melhores 3ºs entram quando a conta pede.
        const pairs = buildFirstRoundPairs(qualifiers);
        const roundNames = roundNamesFor(pairs.length);
        const rounds = roundNames.map((name, roundIndex) => {
          const matchCount = pairs.length / (2 ** roundIndex);
          return {
            name,
            matches: Array.from({ length: matchCount }, (_, index) => {
              if (roundIndex === 0) {
                const [home, away] = pairs[index];
                return createKnockoutMatch(index, home, away);
              }
              return createKnockoutMatch(index, null, null);
            })
          };
        });

        state.knockout = {
          generatedAt: Date.now(),
          rounds,
          championId: null
        };
        state.activeTab = "knockout";
        saveState();
        render();
        notify("Mata-mata gerado.");
      }

      function buildFirstRoundPairs(qualifiers) {
        const firsts = qualifiers.filter((entry) => entry.rank === 1).sort((a, b) => a.groupIndex - b.groupIndex);
        const seconds = qualifiers.filter((entry) => entry.rank === 2).sort((a, b) => a.groupIndex - b.groupIndex);
        const thirds = qualifiers.filter((entry) => entry.rank === 3).sort(compareQualificationEntries);

        if (firsts.length === 4 && seconds.length === 4 && !thirds.length) {
          return [
            [firsts[0], seconds[1]],
            [firsts[2], seconds[3]],
            [firsts[1], seconds[0]],
            [firsts[3], seconds[2]]
          ];
        }

        if (firsts.length === 3 && seconds.length === 3 && thirds.length === 2) {
          return [
            [firsts[0], seconds[1] || seconds[0]],
            [firsts[1], seconds[2] || seconds[0]],
            [firsts[2], seconds[0]],
            [thirds[0], thirds[1]]
          ];
        }

        const pairs = [];
        const availableSeconds = [...seconds];
        firsts.forEach((first) => {
          const chosenIndex = availableSeconds.findIndex((second) => second.groupId !== first.groupId);
          if (chosenIndex >= 0) {
            pairs.push([first, availableSeconds.splice(chosenIndex, 1)[0]]);
          }
        });
        const leftovers = [...availableSeconds, ...thirds];
        while (leftovers.length >= 2) {
          const home = leftovers.shift();
          const awayIndex = leftovers.findIndex((entry) => entry.groupId !== home.groupId);
          const away = awayIndex >= 0 ? leftovers.splice(awayIndex, 1)[0] : leftovers.shift();
          pairs.push([home, away]);
        }
        return pairs;
      }

      function roundNamesFor(firstRoundMatchCount) {
        if (firstRoundMatchCount >= 4) return ["Quartas", "Semifinal", "Final"];
        if (firstRoundMatchCount === 2) return ["Semifinal", "Final"];
        return ["Final"];
      }

      function createKnockoutMatch(index, home, away) {
        return {
          id: uid("ko"),
          label: `Jogo ${index + 1}`,
          homeId: home?.playerId || null,
          awayId: away?.playerId || null,
          homeSeed: home ? seedLabel(home) : "",
          awaySeed: away ? seedLabel(away) : "",
          homeGoals: null,
          awayGoals: null,
          homePenalties: null,
          awayPenalties: null,
          winnerId: null,
          saved: false
        };
      }

      function seedLabel(entry) {
        if (!entry) return "";
        if (entry.kind === "third") return `Melhor 3º · Grupo ${entry.groupName}`;
        return `${entry.rank}º · Grupo ${entry.groupName}`;
      }

      function saveKnockoutMatch(roundIndex, matchIndex) {
        if (!state.knockout) return;
        const match = state.knockout.rounds[roundIndex]?.matches[matchIndex];
        if (!match || !match.homeId || !match.awayId) return;
        const homeGoals = parseScore(document.getElementById(`ko-${match.id}-home-goals`)?.value);
        const awayGoals = parseScore(document.getElementById(`ko-${match.id}-away-goals`)?.value);
        const homePenalties = parseOptionalScore(document.getElementById(`ko-${match.id}-home-pen`)?.value);
        const awayPenalties = parseOptionalScore(document.getElementById(`ko-${match.id}-away-pen`)?.value);
        if (homeGoals === null || awayGoals === null) {
          notify("Informe o placar do jogo.");
          return;
        }
        let winnerId = null;
        if (homeGoals > awayGoals) {
          winnerId = match.homeId;
        } else if (homeGoals < awayGoals) {
          winnerId = match.awayId;
        } else {
          if (homePenalties === null || awayPenalties === null || homePenalties === awayPenalties) {
            notify("Empate no mata-mata precisa de pênaltis com vencedor.");
            return;
          }
          winnerId = homePenalties > awayPenalties ? match.homeId : match.awayId;
        }

        match.homeGoals = homeGoals;
        match.awayGoals = awayGoals;
        match.homePenalties = homePenalties;
        match.awayPenalties = awayPenalties;
        match.winnerId = winnerId;
        match.saved = true;
        propagateKnockout();
        saveState();
        render();
        notify("Mata-mata atualizado.");
      }

      function parseOptionalScore(value) {
        if (value === "" || value === null || value === undefined) return null;
        return parseScore(value);
      }

      function propagateKnockout() {
        if (!state.knockout) return;
        const rounds = state.knockout.rounds;
        for (let roundIndex = 1; roundIndex < rounds.length; roundIndex += 1) {
          const previous = rounds[roundIndex - 1].matches;
          rounds[roundIndex].matches.forEach((match, index) => {
            const homeId = previous[index * 2]?.winnerId || null;
            const awayId = previous[index * 2 + 1]?.winnerId || null;
            if (match.homeId !== homeId || match.awayId !== awayId) {
              match.homeId = homeId;
              match.awayId = awayId;
              match.homeSeed = homeId ? "Vencedor anterior" : "";
              match.awaySeed = awayId ? "Vencedor anterior" : "";
              match.homeGoals = null;
              match.awayGoals = null;
              match.homePenalties = null;
              match.awayPenalties = null;
              match.winnerId = null;
              match.saved = false;
            }
          });
        }
        const finalRound = rounds[rounds.length - 1];
        const finalMatch = finalRound?.matches[0];
        state.knockout.championId = finalMatch?.saved ? finalMatch.winnerId : null;
      }

      function formatRules(text) {
        const clean = text.trim();
        if (!clean) {
          return `<div class="empty-state"><div><span class="empty-icon">${uiIcon("document")}</span><strong>As regras aparecerão aqui.</strong><br>Cole o texto no campo ao lado.</div></div>`;
        }
        return clean.split(/\n{2,}/).map((block) => {
          const lines = block.split("\n").map((line) => line.trim()).filter(Boolean);
          if (!lines.length) return "";
          if (/^#{1,3}\s/.test(lines[0])) {
            const title = lines[0].replace(/^#{1,3}\s*/, "");
            const rest = lines.slice(1).map((line) => `<p>${escapeHtml(line)}</p>`).join("");
            return `<h3>${escapeHtml(title)}</h3>${rest}`;
          }
          if (lines.every((line) => /^[-*•]\s+/.test(line))) {
            return `<ul>${lines.map((line) => `<li>${escapeHtml(line.replace(/^[-*•]\s+/, ""))}</li>`).join("")}</ul>`;
          }
          return `<p>${lines.map(escapeHtml).join("<br>")}</p>`;
        }).join("");
      }

      function exportData() {
        const payload = {
          app: "FUTFRALDA",
          version: 1,
          exportedAt: new Date().toISOString(),
          state
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `futfralda-backup-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function importData(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result));
            const importedState = parsed.state || parsed;
            if (!Array.isArray(importedState.players)) throw new Error("Backup inválido");
            if (!confirm("Importar este JSON vai substituir o torneio atual. Continuar?")) return;
            state = normalizeState(importedState);
            saveState();
            revealCount = Infinity;
            clearInterval(revealTimer);
            render();
            notify("Backup importado.");
          } catch (error) {
            notify("Não consegui importar esse arquivo JSON.");
            console.warn(error);
          }
        };
        reader.readAsText(file);
      }

      function resetTournament() {
        if (!confirm("Resetar todo o FUTFRALDA? Isso apaga cadastro, sorteio, placares e regras.")) return;
        if (!confirm("Confirma mesmo? Essa ação não pode ser desfeita sem backup JSON.")) return;
        state = defaultState();
        localStorage.removeItem(STORAGE_KEY);
        revealCount = Infinity;
        clearInterval(revealTimer);
        render();
        notify("Torneio resetado.");
      }

      document.addEventListener("click", (event) => {
        const tabButton = event.target.closest("[data-tab]");
        if (tabButton) {
          state.activeTab = tabButton.dataset.tab;
          saveState();
          render();
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton || actionButton.disabled) return;
        const action = actionButton.dataset.action;
        if (action === "remove-player") removePlayer(actionButton.dataset.playerId);
        if (action === "draw-teams") drawTeams();
        if (action === "clear-draw") clearDraw();
        if (action === "generate-groups") {
          generateGroupsAndMatches();
          saveState();
          render();
          notify("Grupos gerados.");
        }
        if (action === "save-group-match") saveGroupMatch(actionButton.dataset.matchId);
        if (action === "generate-knockout") generateKnockout();
        if (action === "save-ko-match") saveKnockoutMatch(Number(actionButton.dataset.round), Number(actionButton.dataset.matchIndex));
        if (action === "export") exportData();
        if (action === "reset") resetTournament();
      });

      document.addEventListener("submit", (event) => {
        const form = event.target.closest("[data-form='add-player']");
        if (!form) return;
        event.preventDefault();
        addPlayer(new FormData(form).get("playerName") || "");
      });

      document.addEventListener("change", (event) => {
        const nameInput = event.target.closest("[data-player-name]");
        if (nameInput) {
          updatePlayerName(nameInput.dataset.playerName, nameInput.value);
          return;
        }
        const restrictedInput = event.target.closest("[data-player-restricted]");
        if (restrictedInput) {
          updateRestricted(restrictedInput.dataset.playerRestricted, restrictedInput.checked);
          return;
        }
        const importInput = event.target.closest("[data-action='import']");
        if (importInput) {
          importData(importInput.files[0]);
          importInput.value = "";
        }
      });

      document.addEventListener("input", (event) => {
        const rulesInput = event.target.closest("[data-rules-text]");
        if (!rulesInput) return;
        state.rulesText = rulesInput.value;
        saveState();
        const preview = document.getElementById("rulesPreview");
        if (preview) preview.innerHTML = formatRules(state.rulesText);
      });

      render();
    })();
  </script>
</body>
</html>
